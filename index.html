<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anan — 由 Tracy Duan 打造</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 15%, #a8edea 35%, #fed6e3 55%, #d299ff 75%, #c3cfe2 100%);
      background-attachment: fixed;
      color: #1d1d1f;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(250, 250, 250, 0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      z-index: 1000;
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 52px;
    }

    .nav-logo {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1d1d1f;
      text-decoration: none;
    }

    .nav-links a {
      font-size: 14px;
      color: #6e6e73;
      text-decoration: none;
      margin-left: 28px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #1d1d1f;
    }

    /* Hero Section */
    .hero {
      padding: 160px 24px 100px;
      text-align: center;
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-card {
      background: rgba(255, 255, 255, 0.30);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 48px;
      padding: 60px 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.4);
      max-width: 520px;
      width: 100%;
    }

    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(155, 126, 216, 0.35);
      overflow: hidden;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 12px;
      color: #4a3f6b;
    }

    .hero .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: #6e6e73;
      letter-spacing: 0;
      margin-bottom: 36px;
    }

    .hero .developer {
      font-size: 15px;
      color: #86868b;
      margin-bottom: 36px;
    }

    .hero .developer span {
      color: #6e6e73;
      font-weight: 500;
    }

    /* Download Buttons */
    .download-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 980px;
      font-size: 17px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: rgba(100, 149, 237, 0.85);
      color: white;
      box-shadow: 0 4px 16px rgba(100, 149, 237, 0.3);
    }

    .btn-primary:hover {
      background: rgba(100, 149, 237, 0.95);
      box-shadow: 0 6px 24px rgba(100, 149, 237, 0.45);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(75, 50, 100, 0.75);
      color: white;
      box-shadow: 0 4px 16px rgba(75, 50, 100, 0.25);
    }

    .btn-secondary:hover {
      background: rgba(75, 50, 100, 0.85);
      box-shadow: 0 6px 24px rgba(75, 50, 100, 0.35);
      transform: translateY(-2px);
    }

    .version-info {
      font-size: 14px;
      color: #86868b;
      margin-top: 16px;
    }

    /* Features Section */
    .features {
      padding: 80px 24px;
      text-align: center;
    }

    .features-text {
      max-width: 980px;
      margin: 0 auto;
    }

    .features-main {
      font-size: 36px;
      font-weight: 600;
      color: white;
      margin-bottom: 24px;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .features-sub {
      font-size: 24px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.5px;
    }

    .features-main span,
    .features-sub span {
      margin: 0 12px;
    }



    /* Footer */
    footer {
      padding: 40px 24px;
      text-align: center;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    footer p {
      font-size: 13px;
      color: #86868b;
    }

    footer a {
      color: #6e6e73;
      text-decoration: none;
    }

    footer a:hover {
      color: #1d1d1f;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-content h3 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1d1d1f;
    }

    .modal-content p {
      font-size: 16px;
      color: #6e6e73;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .modal-close {
      background: #0071e3;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 980px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: #0077ed;
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        padding: 100px 16px 60px;
      }

      .hero-card {
        padding: 40px 24px;
        border-radius: 32px;
      }

      .app-icon {
        width: 100px;
        height: 100px;
        border-radius: 24px;
        margin-bottom: 24px;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero .developer {
        font-size: 14px;
        margin-bottom: 28px;
      }

      .btn-download {
        padding: 14px 24px;
        font-size: 15px;
      }

      .features-main {
        font-size: 24px;
      }

      .features-sub {
        font-size: 18px;
      }

      .features-main span,
      .features-sub span {
        margin: 0 8px;
      }

      .nav-links {
        display: none;
      }

      .download-buttons {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .btn-download {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      .version-info {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="#" class="nav-logo">Anan</a>
      <div class="nav-links">
        <a href="#features">功能</a>
        <a href="#download">下载</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="download">
    <div class="hero-card">
      <img src="q1_compressed.png" alt="Anan App Icon" class="app-icon">
      <h1>Anan</h1>
      <p class="developer">Tracy Duan</p>

      <div class="download-buttons">
        <a href="#" class="btn-download btn-primary" onclick="showIOSAlert(); return false;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          App Store 下载
        </a>
        <a href="/download/anan.apk" class="download-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          网页下载
        </a>
      </div>

      <p class="version-info">版本 1.0.0 · 适用于 Android 8.0+</p>
    </div>
  </section>

  <!-- Features Section -->
  <section class="features" id="features">
    <div class="features-text">
      <div class="features-main">
        <span>无需联网</span>
        <span>自建知识库</span>
        <span>AI对话</span>
      </div>
      <div class="features-sub">
        <span>安全</span>
        <span>隐私</span>
        <span>高效</span>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>Copyright © 2026 Tracy Duan. All rights reserved.</p>
    <p style="margin-top: 8px;">
      <a href="#">隐私政策</a> · <a href="#">使用条款</a> · <a href="#" onclick="showContactModal(); return false;">联系作者</a>
    </p>
  </footer>

  <!-- Contact Modal -->
  <div class="modal-overlay" id="contactModal" onclick="closeContactModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3>联系作者</h3>
      <p>duancanyi@gmail.com</p>
      <button class="modal-close" onclick="closeContactModal()">关闭</button>
    </div>
  </div>

  <script>
    // 显示iOS暂不支持提示
    function showIOSAlert() {
      alert('暂不支持iOS系统');
    }

    // 显示联系作者弹窗
    function showContactModal() {
      document.getElementById('contactModal').classList.add('active');
    }

    // 关闭联系作者弹窗
    function closeContactModal(event) {
      if (!event || event.target === document.getElementById('contactModal')) {
        document.getElementById('contactModal').classList.remove('active');
      }
    }

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  </script>
</body>
</html>
